version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: email-agent-postgres
    environment:
      POSTGRES_DB: emailagent
      POSTGRES_USER: emailagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  qdrant:
    image: qdrant/qdrant:latest
    container_name: email-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant/storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  orchestrator:
    build: .
    container_name: email-agent-orchestrator
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      - EMAIL_AGENT_BASE_DIR=/app
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql://emailagent:${POSTGRES_PASSWORD}@postgres:5432/emailagent
    volumes:
      - ./credentials:/app/credentials
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    command: python -m uvicorn orchestrator.main:app --host 0.0.0.0 --port 8787

  telegram-poller:
    build: .
    container_name: email-agent-telegram-poller
    env_file:
      - .env
    environment:
      - EMAIL_AGENT_BASE_DIR=/app
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql://emailagent:${POSTGRES_PASSWORD}@postgres:5432/emailagent
    volumes:
      - ./credentials:/app/credentials
      - ./pending_actions.json:/app/pending_actions.json
      - ./pending_replies.json:/app/pending_replies.json
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    command: python telegram_poller.py
