version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: email-agent-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant/storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  orchestrator:
    build: .
    container_name: email-agent-orchestrator
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env
    environment:
      - EMAIL_AGENT_BASE_DIR=/app
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./config.json:/app/config.json:ro
      - ./credentials:/app/credentials:ro
      - ./vip-list.json:/app/vip-list.json
      - ./blacklist.json:/app/blacklist.json
      - ./feedback.json:/app/feedback.json
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    command: python -m uvicorn orchestrator.main:app --host 0.0.0.0 --port 8787

  telegram-poller:
    build: .
    container_name: email-agent-telegram-poller
    env_file:
      - .env
    environment:
      - EMAIL_AGENT_BASE_DIR=/app
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./config.json:/app/config.json:ro
      - ./credentials:/app/credentials:ro
      - ./vip-list.json:/app/vip-list.json
      - ./blacklist.json:/app/blacklist.json
      - ./feedback.json:/app/feedback.json
      - ./pending_actions.json:/app/pending_actions.json
      - ./pending_replies.json:/app/pending_replies.json
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    command: python telegram_poller.py
